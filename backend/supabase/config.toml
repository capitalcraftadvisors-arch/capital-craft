# Supabase CLI project config — Capital Craft
# Link to remote project with:
#   supabase link --project-ref hpebydmrpimyuxgsgtmu

project_id = "hpebydmrpimyuxgsgtmu"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = false

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

[analytics]
enabled = false

# ─── Edge Functions ───
# Auth uses verify_jwt = false because it mints the JWT itself (login endpoint).
# extract-cheque and store-document accept a Bearer JWT from the caller.

[functions.auth]
verify_jwt = false

[functions.extract-cheque]
verify_jwt = true

[functions.store-document]
verify_jwt = true
